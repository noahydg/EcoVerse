<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录页面</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f0f0f0;
      background-image: url('./img/背景大图2.jpg');
      background-size: cover;
      background-position: center;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal {
      background-color: white;
      border-radius: 10px;
      padding: 20px;
      width: 300px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    .modal h2 {
      margin-bottom: 20px;
      color: darkgreen;
    }

    .modal input {
      width: 90%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .modal button {
      width: 90%;
      padding: 10px;
      background-color: darkgreen;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .modal button:hover {
      background-color: green;
    }

    .modal .switch-link {
      margin-top: 10px;
      display: block;
      color: darkgreen;
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <!-- 登录弹窗 -->
      <div id="loginModal">
        <h2>登录</h2>
        <input type="text" id="loginUsername" placeholder="用户名" />
        <input type="password" id="loginPassword" placeholder="密码" />
        <button onclick="handleLogin()">确认登录</button>
        <span class="switch-link" onclick="showRegister()">没有账号？点击注册</span>
        <span class="switch-link" onclick="showResetPassword()">忘记密码？</span>
      </div>

      <!-- 注册弹窗 -->
      <div id="registerModal" style="display: none;">
        <h2>注册</h2>
        <input type="text" id="registerUsername" placeholder="用户名" />
        <input type="password" id="registerPassword" placeholder="密码" />
        <input type="password" id="confirmPassword" placeholder="确认密码" />
        <button onclick="handleRegister()">确认注册</button>
        <span class="switch-link" onclick="showLogin()">已有账号？返回登录</span>
      </div>

      <!-- 修改密码弹窗 -->
      <div id="resetPasswordModal" style="display: none;">
        <h2>修改密码</h2>
        <input type="text" id="resetUsername" placeholder="用户名" />
        <input type="password" id="newPassword" placeholder="新密码" />
        <input type="password" id="confirmNewPassword" placeholder="确认新密码" />
        <button onclick="handleResetPassword()">确认修改</button>
        <span class="switch-link" onclick="showLogin()">返回登录</span>
      </div>
    </div>
  </div>

  <script>
    // 登陆实现
    function handleLogin() {
      const username = document.getElementById("loginUsername").value.trim();
      const password = document.getElementById("loginPassword").value.trim();
      if (!username || !password) {
        alert("请输入用户名和密码！");
        return;
      }
      window.location.href = "./html/首页.html";
    }
    // 修改密码、注册实现
    function handleRegister() {
      const username = document.getElementById("registerUsername").value.trim();
      const password = document.getElementById("registerPassword").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();
      if (!username || !password || !confirmPassword) {
        alert("请填写所有字段！");
        return;
      }
      if (password !== confirmPassword) {
        alert("两次输入的密码不一致！");
        return;
      }
      alert("注册成功！");
      showLogin();
    }

    function handleResetPassword() {
      const username = document.getElementById("resetUsername").value.trim();
      const newPassword = document.getElementById("newPassword").value.trim();
      const confirmNewPassword = document.getElementById("confirmNewPassword").value.trim();
      if (!username || !newPassword || !confirmNewPassword) {
        alert("请填写所有字段！");
        return;
      }
      if (newPassword !== confirmNewPassword) {
        alert("两次输入的密码不一致！");
        return;
      }
      alert("密码修改成功！");
      showLogin();
    }

    function showLogin() {
      document.getElementById("loginModal").style.display = "block";
      document.getElementById("registerModal").style.display = "none";
      document.getElementById("resetPasswordModal").style.display = "none";
    }

    function showRegister() {
      document.getElementById("loginModal").style.display = "none";
      document.getElementById("registerModal").style.display = "block";
      document.getElementById("resetPasswordModal").style.display = "none";
    }

    function showResetPassword() {
      document.getElementById("loginModal").style.display = "none";
      document.getElementById("registerModal").style.display = "none";
      document.getElementById("resetPasswordModal").style.display = "block";
    }
  </script>
</body>

</html>
