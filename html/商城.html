<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生态守护 - 商城</title>
  <link rel="stylesheet" href="../css/base.css">
  <script src="../js/jq.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      box-sizing: border-box;
      padding: 20px;
    }

    #sidebar {
      width: 35%;
      height: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-right: 20px;
      box-sizing: border-box;
    }

    .logo-title-container,
    .menu-container {
      width: 100%;
      background-color: lightgreen;
      border-radius: 15px;
      box-sizing: border-box;
      margin-bottom: 100px;
      transition: transform .3s ease;
    }

    .logo-title-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 15px;
    }

    .menu-container {
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform .3s ease;
    }

    .menu-container:hover {
      transform: scale(1.05);
    }

    .menu-item {
      padding: 12px;
      margin: 10px 0;
      cursor: pointer;
      border-radius: 10px;
      transition: transform .3s ease;
      width: 80%;
      text-align: center;
      font-size: 20px;
    }

    .menu-item:hover,
    .selected {
      background-color: darkgreen;
      color: white;
    }

    .logo {
      background-color: white;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      border-radius: 10px;
      margin-top: 20px;
      margin-bottom: 5px;
      transition: transform .3s ease;
    }
    .logo:hover {
      background-color: darkgreen;
      transform: scale(1.15);
    }

    .site-title {
      color: black;
      font-size: 28px;
      font-weight: bold;
      margin-top: 10px;
      margin-bottom: 20px;
      font-family: 黑体;
    }

    #content {
      display: flex;
      flex-grow: 1;
      flex-wrap: wrap;
      background-color: white;
      height: 100vh;
      overflow-y: auto;
      border-radius: 15px;
      transition: transform 0.5s ease;
      min-width: 0;
    }

    #shop-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .product-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      width: 100%;
      padding: 20px;
    }

    .product-card {
      width: calc(25% - 10px);
      border-radius: 15px;
      overflow: hidden;
      background-color: white;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      text-align: center;
      padding: 10px;
      transition: transform 0.3s;
    }

    .product-card img {
      width: 100%;
      height: auto;
      border-radius: 10px;
    }

    .product-card:hover {
      transform: scale(1.05);
    }

    .product-name {
      font-size: 18px;
      margin: 10px 0;
    }

    .product-price {
      color: green;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .product-button {
      padding: 10px 20px;
      background-color: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="lodding-wrap">
    <div class="loadding-div"></div>
  </div>
  <div id="sidebar">
    <div class="logo-title-container">
      <div class="logo" onclick="navigateTo('首页.html')"><img src="../img/logo.jpg" style="width:80px; border-radius: 10px;"></div>
      <div class="site-title">生态守护<br>Ecoverse</div>
    </div>
    <div class="menu-container">
      <div class="menu-item" onclick="navigateTo('生态.html')">生态</div>
      <div class="menu-item" onclick="navigateTo('发现.html')">发现</div>
      <div class="menu-item selected" onclick="navigateTo('商城.html')">商城</div>
      <div class="menu-item" onclick="navigateTo('账户.html')">账户</div>
    </div>
  </div>
  <div id="content">
    <div id="shop-page">
      <h1>生态守护商城</h1>
      <div class="product-container">
        <div class="product-card">
          <img src="../img/product1.webp" alt="商品图片1">
          <p class="product-name">环保水杯</p>
          <p class="product-price">¥29.99</p>
          <button class="product-button">购买</button>
        </div>
        <div class="product-card">
          <img src="../img/product2.webp" alt="商品图片2">
          <p class="product-name">竹制牙刷</p>
          <p class="product-price">¥15.99</p>
          <button class="product-button">购买</button>
        </div>
        <div class="product-card">
          <img src="../img/product3.webp" alt="商品图片3">
          <p class="product-name">可降解餐具</p>
          <p class="product-price">¥39.99</p>
          <button class="product-button">购买</button>
        </div>
        <div class="product-card">
          <img src="../img/product4.webp" alt="商品图片4">
          <p class="product-name">环保购物袋</p>
          <p class="product-price">¥9.99</p>
          <button class="product-button">购买</button>
        </div>
        <div class="product-card">
          <img src="../img/product5.webp" alt="商品图片5">
          <p class="product-name">太阳能充电器</p>
          <p class="product-price">¥199.99</p>
          <button class="product-button">购买</button>
        </div>
        <div class="product-card">
          <img src="../img/product6.webp" alt="商品图片6">
          <p class="product-name">环保笔记本</p>
          <p class="product-price">¥49.99</p>
          <button class="product-button">购买</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    function navigateTo(page) {
      window.location.href = page;
    }
  </script>
</body>
<script src="../js/base.js"></script>
</html>
