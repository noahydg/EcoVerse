<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生态守护 - 首页</title>
  <link rel="stylesheet" href="../css/base.css">
  <script src="../js/jq.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      box-sizing: border-box;
      padding: 20px;
    }

    #sidebar {
      width: 35%;
      height: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-right: 20px;
      box-sizing: border-box;
    }

    .logo-title-container,
    .menu-container {
      width: 100%;
      background-color: lightgreen;
      border-radius: 15px;
      box-sizing: border-box;
      margin-bottom: 100px;
      transition: transform 0.3s;
    }

    .logo-title-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 15px;
    }
/* 菜单栏（导航栏） */
    .menu-container {
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform .3s ease;
    }

    .menu-container:hover {
      transform: scale(1.05);
    }
    .menu-item {
      padding: 12px;
      margin: 10px 0;
      cursor: pointer;
      border-radius: 10px;
      transition: transform .3s ease;
      width: 80%;
      text-align: center;
      font-size: 20px;
    }

    .menu-item:hover {
      background-color: darkgreen;
      color: white;
    }

    .selected {
      background-color: green;
      color: white;
    }

    .logo {
      background-color: darkgreen;
      color: white;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      border-radius: 10px;
      margin-top: 20px;
      margin-bottom: 5px;
      transition: transform .3s ease;
    }

    .logo:hover {
      background-color: darkgreen;
      transform: scale(1.15);

    }

    .site-title {
      color: black;
      font-size: 28px;
      font-weight: bold;
      margin-top: 10px;
      margin-bottom: 20px;
      font-family: 黑体;
    }

    #content {
      display: flex;
      flex-grow: 1;
    
      background-color: white;
      height: 100vh;
      overflow-y:auto;
      border-radius: 15px;
      transition: transform 0.5s ease;
      min-width: 0;
    }

    #homepage {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      min-width: 300px;
      margin-top: 20px;
    }

    .main-image {
      width: 45%;
      height: auto;
      border-radius: 15px;
      margin-bottom: 10px;
    }

    .card-container {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      width: 100%;
    }

    .card {
      width: calc(25% - 10px);
      border-radius: 15px;
      overflow: hidden;
      background-color: white;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      text-align: center;
      transition: transform .3s ease;
    }

    .card img {
      width: 100%;
      height: auto;
    }

    .card:hover {
      transform: scale(1.05);
    }

    #user-info-container {
      width: 80%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 100px;
      background-color: lightgreen;
      border-radius: 15px;
      box-sizing: border-box;
      padding: 15px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: darkgreen;
      margin-bottom: 10px;
    }

    .username {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .logout {
      padding: 8px 16px;
      background-color: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #right-div {
      width: 80%;
      background-color: lightgreen;
      height: 100%;
      border-radius: 15px;
      box-sizing: border-box;
      margin-bottom: 100px;
      align-items: center;
      overflow-y:auto;
    }
    .welcome{
      width: 99%;
      height:auto;
      align-items: center;
      position: relative;
    }

    .gobuttom {
      display: inline-block;
      height: 28px;
      line-height: 28px;
      padding: 0px 35px 0 20px;
      border: 2px solid white;
      border-radius: 15px;
      cursor: pointer;
      transition: transform .3s ease;
      color: #fcfcfe;
      position: absolute;
      left:40%;
      bottom:190px;
    }
    /* 悬浮效果 */
    .gobuttom:hover{
      transform:scale(1.1);
      color:#fff;
    }
    .gobuttom::after{
      position: absolute;
      right: 10px;
      top: 50%;
      content: '';
      width: 0px;
      height: 0px;
      border-top: 4px solid transparent;
      border-left: 8px solid #fff;
      border-bottom: 4px solid transparent;
      animation: bmove 1s infinite;
    }
    /* 动画效果 */
@keyframes bmove {
  0%{
    opacity: 1;
    transform: translateX(-8px) translateY(-50%);
  }
  100%{
    opacity: 0;
    transform: translateX(5px) translateY(-50%);
  }
}
  </style>
</head>

<body>
  <div class="lodding-wrap">
    <div class="loadding-div"></div>
  </div>
  <div id="sidebar">
    <div class="logo-title-container">
      <div class="logo" onclick="navigateTo('首页.html')"><img src="../img/logo.jpg" style="width:80px; border-radius: 10px;"></div>
      <div class="site-title"><span style="font-size: 25px;">生态守护</span><br>Ecoverse</div>
    </div>
    <div class="menu-container">
      <div class="menu-item" onclick="navigateTo('生态.html')">生态</div>
      <div class="menu-item" onclick="navigateTo('发现.html')">发现</div>
      <div class="menu-item" onclick="navigateTo('商城.html')">商城</div>
      <div class="menu-item" onclick="navigateTo('账户.html')">账户</div>
    </div>
  </div>
  <div id="content">
    <div id="homepage">
      <div class="welcome">
        <img src="../img/背景大图1.jpg" alt="欢迎来到生态守护"; style=" border-radius:6%; width:99%; height:95%; margin-left:6px; ">
        <!-- <div style="text-align: center; font-size: larger; position:absolute; top:200px;">直挂云帆济沧海</div> -->
        <h1 style="color:aliceblue; text-align: center; font-size: 50px; position:absolute; top:190px;left:23%; font-family: 黑体;">热爱环境、守护生态</h1>
        <a class="gobuttom" href="javascript:void(0);" onclick="scrollToSection()">来看看吧！
        </a>
      </div>
      <div
        style="display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 20px; margin-bottom: 20px;">
        <div style="flex: 1; text-align: center;">
          <h2>欢迎来到生态守护</h2>
          <p>我们致力于保护地球的未来，为下一代留下美丽的家园。</p>
          <ul style="text-align: left; padding: 0; list-style-type: disc; margin: 10px 20px;">
            <li>发现周边的生态资源</li>
            <li>支持环保项目</li>
            <li>了解更多环境保护知识</li>
          </ul>
        </div>
        <img class="main-image" src="../img/main-image.webp" alt="生态守护大图" />
        <div style="flex: 1; text-align: center;">
          <h2>立即参与行动！</h2>
          <p>通过简单的日常行动，每个人都可以成为环境保护的英雄。</p>
          <button
            style="padding: 10px 20px; background-color: green; color: white; border: none; border-radius: 5px; cursor: pointer;">
            加入我们
          </button>
        </div>
      </div>
      <div class="card-container" id="go-next">
        <div class="card">
          <img src="../img/card1.webp" alt="卡片图片1">
          <p>卡片内容1</p>
        </div>
        <div class="card">
          <img src="../img/card2.webp" alt="卡片图片2">
          <p>卡片内容2</p>
        </div>
        <div class="card">
          <img src="../img/card3.webp" alt="卡片图片3">
          <p>卡片内容3</p>
        </div>
        <div class="card">
          <img src="../img/card4.webp" alt="卡片图片4">
          <p>卡片内容4</p>
        </div>
        <div class="card">
          <img src="../img/card1.webp" alt="卡片图片1">
          <p>卡片内容5</p>
        </div>
        <div class="card">
          <img src="../img/card2.webp" alt="卡片图片2">
          <p>卡片内容6</p>
        </div>
        <div class="card">
          <img src="../img/card3.webp" alt="卡片图片3">
          <p>卡片内容7</p>
        </div>
        <div class="card">
          <img src="../img/card4.webp" alt="卡片图片4">
          <p>卡片内容8</p>
        </div>
      </div>
    </div>
  </div>
  <div
      style="width: 25%; min-width: 200px; max-width: 300px; display: flex; flex-direction: column; align-items: center;">
      <div id="user-info-container">
        <div class="avatar"></div>
        <div class="username">用户名</div>
        <button class="logout" onclick="navigateTo('../登录.html')">退出登录</button>
      </div>
      <div id="right-div">
        <button id="summon-btn" style="margin-top:20px; padding: 10px;">召唤/收起小助手</button>
        <div id="assistant" class="hidden draggable">
          <video id="character-video" src="../img/出场动画.mp4" muted class="hidden"></video>
          <video id="hover-video" src="../img/显示动画.mp4" muted class="hidden"></video>
          <img id="character" src="../img/AI助手.jpg" alt="小助手">
        </div>
        <div id="dialog" class="hidden" style="position:fixed;bottom:350px;right:10px;">
          <button id="close-btn" style="border:1px solid black; background-color:red; padding:0; position: absolute; bottom:35px;left:367px; font-weight: bold;">X</button>
          <textarea id="user-input" placeholder="请输入内容..."></textarea>
          <button id="send-btn" style="position: absolute; top:32px;">发送</button>
          <div id="response"></div>
        </div>
      </div>
    </div>
    
  <script>
    // 滚轮效果
  function scrollToSection() {
  const targetSection = document.getElementById('go-next');
    if (targetSection) {
        targetSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }
    function navigateTo(page) {
      window.location.href = page;
    }
  </script>
</body>
<script src="../js/base.js"></script>
</html>
