<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>生态守护 - 发现</title>
    <link rel="stylesheet" href="../css/base.css">
    
    <script src="../js/jq.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            box-sizing: border-box;
            padding: 20px;
        }

        #sidebar {
            width: 35%;
            height: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-right: 20px;
            box-sizing: border-box;
        }

        .logo-title-container,
        .menu-container {
            width: 100%;
            background-color: lightgreen;
            border-radius: 15px;
            box-sizing: border-box;
            margin-bottom: 100px;
            transition: transform 0.3s;
        }

        .logo-title-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
        }

        .menu-container {
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s ease;
        }

        .menu-container:hover {
            transform: scale(1.05);
        }

        .menu-item {
            padding: 12px;
            margin: 10px 0;
            cursor: pointer;
            border-radius: 10px;
            transition: background-color 0.3s;
            width: 80%;
            text-align: center;
            font-size: 20px;
        }

        .menu-item:hover,
        .selected {
            background-color: darkgreen;
            color: white;
        }

        .logo {
            background-color:white;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            border-radius: 10px;
            margin-top: 20px;
            margin-bottom: 5px;
            transition: transform .3s ease;
        }
        .logo:hover {
          background-color: darkgreen;
          transform: scale(1.15);
        }

        .site-title {
            color: black;
            font-size: 30px;
            font-weight: bold;
            margin-top: 10px;
            margin-bottom: 20px;
            font-family: 黑体;
        }

        #content {
            display: flex;
            flex-grow: 1;
            flex-wrap: wrap;
            background-color: white;
            height: 100vh;
            overflow-y: auto;
            border-radius: 15px;
            transition: transform 0.5s ease;
            min-width: 0;
        }

        #discovery-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 300px;
            margin-top: 20px;
        }

        .section {
            width: 90%;
            margin: 20px 0;
            padding: 15px;
            border-radius: 15px;
            background-color: #f5f5f5;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .section h3 {
            margin-bottom: 10px;
            color: green;
            text-align: center;
        }

        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .card {
            width: calc(25% - 10px);
            border-radius: 15px;
            overflow: hidden;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            text-align: center;
            transition: transform 0.3s;
        }

        .card img {
            width: 100%;
            height: auto;
        }

        .card:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="lodding-wrap">
        <div class="loadding-div"></div>
      </div>
    <div id="sidebar">
        <div class="logo-title-container">
            <div class="logo" onclick="navigateTo('首页.html')"><img src="../img/logo.jpg" style="width:80px; border-radius: 10px;"></div>
            <div class="site-title">生态守护<br>Ecoverse</div>
        </div>
        <div class="menu-container">
            <div class="menu-item" onclick="navigateTo('生态.html')">生态</div>
            <div class="menu-item selected" onclick="navigateTo('发现.html')">发现</div>
            <div class="menu-item" onclick="navigateTo('商城.html')">商城</div>
            <div class="menu-item" onclick="navigateTo('账户.html')">账户</div>
        </div>
    </div>
    <div id="content">
        <div id="discovery-page">
            <div class="section">
                <h3>发现新的生态项目</h3>
                <div class="card-container">
                    <div class="card">
                        <img src="../img/card1.webp" alt="项目1">
                        <p>城市绿化行动</p>
                    </div>
                    <div class="card">
                        <img src="../img/card2.webp" alt="项目2">
                        <p>水资源保护计划</p>
                    </div>
                    <div class="card">
                        <img src="../img/card3.webp" alt="项目3">
                        <p>森林再生计划</p>
                    </div>
                    <div class="card">
                        <img src="../img/card4.webp" alt="项目4">
                        <p>清洁能源推广</p>
                    </div>
                </div>
            </div>

            <div class="section">
                <h3>近期活动</h3>
                <div class="card-container">
                    <div class="card">
                        <img src="../img/card1.webp" alt="活动1">
                        <p>植树节活动</p>
                    </div>
                    <div class="card">
                        <img src="../img/card2.webp" alt="活动2">
                        <p>公益讲座：环保知识普及</p>
                    </div>
                    <div class="card">
                        <img src="../img/card3.webp" alt="活动3">
                        <p>海滩垃圾清理</p>
                    </div>
                    <div class="card">
                        <img src="../img/card4.webp" alt="活动4">
                        <p>社区环保计划</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function navigateTo(page) {
            window.location.href = page;
        }
    </script>
</body>
<script src="../js/base.js"></script>
</html>
